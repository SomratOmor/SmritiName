<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmritiName | Central Registry</title>
    <style>
        body { background: #0a0a0a; color: #00ffcc; font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .box { background: #111; border: 1px solid #00ffcc; padding: 30px; border-radius: 10px; width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #00ffcc; border: none; font-weight: bold; cursor: pointer; }
        #msg { margin-top: 15px; font-size: 13px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>SmritiName</h2>
        <input type="text" id="domain" placeholder="Domain Name">
        <input type="text" id="target" placeholder="Target URL">
        <button id="btn">REGISTER</button>
        <div id="msg"></div>
    </div>

    <script>
        document.getElementById('btn').addEventListener('click', async () => {
            const domain = document.getElementById('domain').value;
            const target = document.getElementById('target').value;
            const msg = document.getElementById('msg');

            msg.innerText = "Sending...";

            try {
                const res = await fetch('/api/v1/register', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'X-Smriti-Key': 'Samrat_Omor_16_Year_Gift'
                    },
                    body: JSON.stringify({ domain, target })
                });
                
                const data = await res.json();
                if(data.status === 'success') {
                    msg.innerHTML = "✅ Registered Successfully!";
                    msg.style.color = "#00ffcc";
                } else {
                    msg.innerHTML = "❌ Error: " + (data.message || "Failed");
                    msg.style.color = "red";
                }
            } catch (e) {
                msg.innerHTML = "❌ Server not responding";
                msg.style.color = "red";
            }
        });
    </script>
</body>
</html>
